services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data            # 재시작해도 데이터 유지
    command: redis-server --appendonly yes  # AOF 영속성 활성화
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-backend:
    build: .
    ports:
      - "4000:4000"
    environment:
      - REDIS_HOST=redis            # compose 내부 서비스명으로 연결
      - REDIS_PORT=6379
      - PORT=4000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy  # Redis 준비 완료 후 Express 시작
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:                       # named volume으로 데이터 영속 보관
